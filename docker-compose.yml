version: '3.8'
services:
  backend:
    build: 
      context: ./backend
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=development
      - SECRET_KEY=${SECRET_KEY:-pulse-dev-secret}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-pulse-dev-jwt-secret}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:5173}
    volumes:
      - ./backend:/app
    command: python app.py

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000/api
      - VITE_SOCKET_URL=http://localhost:5000
    command: npm run dev -- --host 0.0.0.0
