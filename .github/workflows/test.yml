name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  SECRET_KEY: ci-secret-key
  JWT_SECRET_KEY: ci-jwt-secret-key
  CORS_ORIGINS: http://localhost:5173

jobs:
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compile check
        run: python -m py_compile app.py auth_routes.py hospital_routes.py models.py patient_routes.py seed.py auth_utils.py config.py validation.py services/*.py

      - name: Run tests
        run: python -m pytest -q tests/

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
