<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pulse | Burden-Free Hospital System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script>
    window.addEventListener('error', function(e) {
      document.body.innerHTML += '<div style="position:fixed; top:10px; left:10px; background:red; color:white; padding:20px; z-index:99999; border-radius:8px;"><b>CRITICAL CRASH:</b> ' + e.message + '<br>' + e.filename + ':' + e.lineno + '</div>';
    });
  </script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app" class="animate-fade-in">
    <!-- App Content Injected Here -->
  </div>
  
  <script src="socket.io.min.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
